name: Neon

on:
  pull_request:
    types: [closed]
  delete:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.event.ref }}

jobs:
  delete_neon_branch:
    name: Delete Neon Branch
    if: github.event_name == 'pull_request' || github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve branch name
        id: branch
        env:
          REF: ${{ github.event.pull_request.head.ref || github.event.ref }}
        run: echo "name=$REF" >> "$GITHUB_OUTPUT"

      - name: Skip if a PR already handled this branch
        id: skip
        if: github.event_name == 'delete'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
          REPO: ${{ github.repository }}
        run: |
          count=$(gh pr list --repo "$REPO" --state closed --head "$BRANCH" --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "PR exists for $BRANCH — pull_request:closed already handled cleanup"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete preview Neon Branch
        if: steps.skip.outputs.skip != 'true'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/${{ steps.branch.outputs.name }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Delete local Neon Branch (if exists)
        if: steps.skip.outputs.skip != 'true'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_NAME: local/${{ steps.branch.outputs.name }}
        run: |
          npm i -g neonctl@v2
          if neonctl branches list --project-id "$PROJECT_ID" --output json \
            | jq -e --arg name "$BRANCH_NAME" '[.. | objects | .name? // empty] | any(. == $name)' > /dev/null; then
            echo "Branch $BRANCH_NAME exists — deleting"
            neonctl branches delete "$BRANCH_NAME" --project-id "$PROJECT_ID"
          else
            echo "Branch $BRANCH_NAME does not exist — skipping delete"
          fi
