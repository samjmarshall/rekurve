  prompt: 'I need a thorough, current (as of 2026) research report on integrating OpenTelemetry (OTEL)
    with Claude Code (Anthropic''s CLI coding agent) for LOCAL observability. The goal is to surface real-world
    sub-agent activity — specifically sub-agent prompts, sub-agent results/outputs, and metrics like latency,
    token usage, and cost — to build a baseline dataset for evaluating and improving sub-agent prompts.


