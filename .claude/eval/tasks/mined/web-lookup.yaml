  prompt: 'I need two authoritative facts to de-risk an email-correlation design. Please answer both with
    citations (official Microsoft Learn / HubSpot developer docs preferred), and be precise about what
    is and isn''t settable/readable.


    QUESTION 1 — Microsoft Graph `/me/sendMail`:

    When sending mail via the Microsoft Graph `POST /me/sendMail` action (the `message` resource), can
    the CALLER set a deterministic, correlatable identifier on the outgoing message that survives delivery?
    Specifically:

    (a) Is the `internetMessageId` property of the `message` resource writable on send, or is it read-only
    / overwritten by Exchange Online?

    (b) Can the caller add a custom header via the `internetMessageHeaders` property? What are the constraints
    (e.g., must header names start with `x-` or `X-`)? Is there a limit on number/size?

    (c) What is the recommended way to stamp a correlation ID on an outbound Graph email so it can be
    matched later?


    QUESTION 2 — HubSpot email engagements:

    When HubSpot ingests an inbound BCC''d email and creates an email engagement (object type `0-49`,
    the 1:1 email engagement), which retrievable properties expose the original RFC822 headers? Specifically:

    (a) Does the HubSpot CRM API expose the original `Message-ID` / `internetMessageId` header of the
    email on the email engagement object?

    (b) Is there an `hs_email_headers` property (or similar) returned by `GET /crm/v3/objects/emails/{id}`
    that contains the raw internet headers (and would therefore contain any custom `X-` header the sender
    added)? What does its shape look like?

    (c) What properties must be explicitly requested to get headers back?


    Report each finding crisply with the source URL and version/date if available. If something is genuinely
    undocumented or tenant-dependent, say so explicitly rather than guessing.'
