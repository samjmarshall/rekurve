  prompt: 'Research and synthesise across ≥3 sources how teams in production customise / extend BetterAuth''s
    built-in rate-limiter using `secondaryStorage` (Redis-backed). I want to understand the practical
    patterns, gotchas, and limits — not just the API.


    Specifically:


    1. **Per-endpoint custom rules** — how do teams structure `customRules` for things like: OTP-request
    endpoints (per-phone *and* per-IP), signup, password-reset, generic auth endpoints? Is there a way
    to key by *both* IP and identifier (e.g. phone+IP composite)? Or do you need to call a separate limiter
    manually inside a hook?


    2. **Beyond auth endpoints** — can BetterAuth''s rate-limit be invoked from *non-auth* code (e.g.
    a tRPC procedure for AI calls)? Or is it strictly scoped to BetterAuth''s own endpoints? If it''s
    scoped, what''s the recommended pattern for reusing the same secondaryStorage + Redis backend for
    an app-level limiter (e.g. expose a helper that uses the same client)?


    3. **secondaryStorage gotchas** — what are common pitfalls when wiring up `secondaryStorage`? (e.g.
    ttl unit confusion — seconds vs ms; serialization; key collisions between rate-limit and sessions
    if both are enabled; cold-start latency with Upstash REST vs ioredis on Vercel).


    4. **Sessions side-effect** — if you enable `secondaryStorage` only for rate-limit but BetterAuth
    *also* starts using it for sessions, is that desirable? Any cost / consistency implications?


    5. **Migration patterns** — are there documented stories of teams migrating from a custom limiter
    (e.g. their own Upstash-backed limiter) to BetterAuth''s built-in one? Any pitfalls/regrets?


    Sources to consider: BetterAuth official docs, BetterAuth GitHub issues/discussions, blog posts from
    Next.js / Vercel community, dev.to articles, any Reddit threads in r/nextjs.


    Report under 800 words. Lead with the answer to "can a single BetterAuth `rateLimit` config truly
    replace a heterogeneous custom limiter that''s used both inside *and* outside auth flows", then back
    it up with evidence. Cite each source inline.'
