name: Post-Deploy Verification

on:
  repository_dispatch:
    types:
      - "vercel.deployment.ready"

jobs:
  setup:
    name: Setup (${{ github.event.client_payload.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      statuses: write
    outputs:
      db_url: ${{ steps.neon.outputs.db_url }}
      db_url_unpooled: ${{ steps.neon.outputs.db_url_unpooled }}
      branch_id: ${{ steps.neon.outputs.branch_id }}
      pre_migrate_timestamp: ${{ steps.pre_migrate.outputs.timestamp }}

    steps:
      - name: Report job & status
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "DB Migration & E2E Setup"

      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        id: modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

      - name: Yarn cache
        if: steps.modules-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: make install

      - name: Resolve Neon branch database URL
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          GIT_REF: ${{ github.event.client_payload.git.ref }}
          ENVIRONMENT: ${{ github.event.client_payload.environment }}
        run: |
          BRANCHES=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches")

          if [ "$ENVIRONMENT" = "production" ]; then
            BRANCH_ID=$(echo "$BRANCHES" | jq -r '.branches[] | select(.primary == true) | .id')
          else
            BRANCH_ID=$(echo "$BRANCHES" | jq -r --arg ref "preview/$GIT_REF" \
              '.branches[] | select(.name == $ref) | .id')
          fi

          if [ -z "$BRANCH_ID" ]; then
            echo "::warning::Could not resolve Neon branch for ref '$GIT_REF' — auth tests will skip"
            exit 0
          fi

          POOLED=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/connection_uri?branch_id=$BRANCH_ID&role_name=neondb_owner&database_name=neondb")
          DIRECT=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/connection_uri?branch_id=$BRANCH_ID&role_name=neondb_owner&database_name=neondb&pooled=false")

          echo "db_url=$(echo "$POOLED" | jq -r '.uri')" >> "$GITHUB_OUTPUT"
          echo "db_url_unpooled=$(echo "$DIRECT" | jq -r '.uri')" >> "$GITHUB_OUTPUT"
          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"

      - name: Record pre-migration timestamp
        if: steps.neon.outputs.db_url
        id: pre_migrate
        run: echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Run database check
        if: steps.neon.outputs.db_url
        run: yarn db:check
        env:
          SKIP_ENV_VALIDATION: 1
          DATABASE_URL_UNPOOLED: ${{ steps.neon.outputs.db_url_unpooled }}

      - name: Run database migrations
        if: steps.neon.outputs.db_url
        run: yarn db:migrate
        env:
          SKIP_ENV_VALIDATION: 1
          DATABASE_URL_UNPOOLED: ${{ steps.neon.outputs.db_url_unpooled }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps

  shard:
    name: E2E Test ${{ matrix.shard }}/4 (${{ github.event.client_payload.environment }})
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Report job & status
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "E2E Test ${{ matrix.shard }}"

      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
          fail-on-cache-miss: true

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true

      - name: Install Playwright system deps
        run: yarn playwright install-deps

      - name: Run Playwright tests
        run: make test_e2e
        env:
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}/4
          E2E_SKIP_GLOBAL_TEARDOWN: "1"
          VERCEL_URL: ${{ github.event.client_payload.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DATABASE_URL: ${{ needs.setup.outputs.db_url }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          # Inbound webhook tests only run on production — the HubSpot
          # webhook target URL is manually pinned to the production deployment
          HUBSPOT_WEBHOOK_ACTIVE: ${{ github.event.client_payload.environment == 'production' && '1' || '' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}-${{ github.event.client_payload.environment }}
          path: |
            blob-report/
            test-results/
          if-no-files-found: error
          retention-days: 30

  summary:
    name: Summary (${{ github.event.client_payload.environment }})
    needs: shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      statuses: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*-${{ github.event.client_payload.environment }}
          merge-multiple: true

      - name: Merge blob reports into HTML
        # The shard upload step bundles `blob-report/` and `test-results/`
        # together, so `merge-multiple: true` puts blob files under
        # `all-blob-reports/blob-report/`, not at the top level.
        run: yarn playwright merge-reports --reporter html ./all-blob-reports/blob-report

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.client_payload.environment }}
          path: playwright-report/
          retention-days: 30

      - name: Fail if any shard failed
        if: ${{ contains(needs.shard.result, 'failure') || contains(needs.shard.result, 'cancelled') }}
        run: exit 1

  cleanup:
    name: Cleanup (${{ github.event.client_payload.environment }})
    needs: [setup, shard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

      - name: Sweep test residue
        if: needs.setup.outputs.db_url
        env:
          DATABASE_URL: ${{ needs.setup.outputs.db_url }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: yarn tsx -e "import('./e2e/utils/global-teardown.ts').then(m => m.default())"

      - name: Rollback migrations (preview — reset branch to parent)
        if: ${{ contains(needs.shard.result, 'failure') && needs.setup.outputs.branch_id != '' && github.event.client_payload.environment != 'production' }}
        uses: neondatabase/reset-branch-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ needs.setup.outputs.branch_id }}
          parent: true
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Rollback migrations (production — point-in-time restore)
        if: ${{ contains(needs.shard.result, 'failure') && needs.setup.outputs.branch_id != '' && github.event.client_payload.environment == 'production' }}
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_ID: ${{ needs.setup.outputs.branch_id }}
          BEFORE_TS: ${{ needs.setup.outputs.pre_migrate_timestamp }}
        run: |
          curl -X POST \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID/restore" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"source_branch_id\": \"$BRANCH_ID\", \"source_timestamp\": \"$BEFORE_TS\", \"preserve_under_name\": \"pre-migration-backup\"}"
          echo "::warning::Production database restored to pre-migration state ($BEFORE_TS)"

  # Override the commit status when any shard fails/cancels or the summary
  # job itself does not succeed. The Vercel post-status action posts its
  # status from the start of the summary job using `needs.shard.result`, so
  # it can't see failures inside the summary job (e.g. merge-reports failing)
  # and reports `success` on cancellation. This job runs after shard+summary
  # complete and overwrites the commit status with `failure` so PR checks
  # reflect reality.
  override-status:
    name: Mark failed run as failed
    needs: [shard, summary]
    if: ${{ always() && (needs.summary.result != 'success' || contains(needs.shard.result, 'failure') || contains(needs.shard.result, 'cancelled')) }}
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post failure commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.client_payload.git.sha }}
          REPO: ${{ github.repository }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHARD_RESULT: ${{ needs.shard.result }}
          SUMMARY_RESULT: ${{ needs.summary.result }}
        run: |
          if [ "$SUMMARY_RESULT" = "cancelled" ] || [[ "$SHARD_RESULT" == *cancelled* ]]; then
            DESCRIPTION="Job cancelled (likely timeout)"
          else
            DESCRIPTION="Verification failed (shard: $SHARD_RESULT, summary: $SUMMARY_RESULT)"
          fi
          gh api -X POST \
            "repos/$REPO/statuses/$SHA" \
            -f state=failure \
            -f context="Post-Deploy Verification" \
            -f description="$DESCRIPTION" \
            -f target_url="$TARGET_URL"
