  kind: execution
  prompt: "You are reviewing a specific UI change on the `feat/258-lead-outbox-cutover` branch of a Next.js\
    \ app called Rekurve. The app runs at https://rekurve.localhost via Vercel Portless.\n\n## What changed\n\
    \n`src/app/(application)/leads/[id]/_components/profile-header.tsx` added a conditional HubSpot-sync\
    \ status element after the lead's stage badge:\n\n```tsx\n{lead.hubspotContactId ? (\n  <a\n    href={`https://app.hubspot.com/contacts/${lead.hubspotContactId}`}\n\
    \    target=\"_blank\"\n    rel=\"noopener noreferrer\"\n    className=\"text-muted-foreground text-xs\
    \ underline underline-offset-2 hover:text-foreground\"\n    data-testid=\"lead-profile-hubspot-link\"\
    \n  >\n    View in HubSpot\n  </a>\n) : (\n  <Badge\n    variant=\"outline\"\n    className=\"px-3\
    \ py-1 text-xs\"\n    data-testid=\"lead-profile-hubspot-syncing\"\n  >\n    Syncing to HubSpot…\n\
    \  </Badge>\n)}\n```\n\nThe badge sits inside a flex row alongside the score circle (a 80×80px circle\
    \ with the numeric score) and the stage badge (e.g. \"Warm\", \"Hot\"). This element is the UI manifestation\
    \ of a DB-first architecture change: leads are now captured locally first (hubspotContactId=null),\
    \ with HubSpot sync happening asynchronously via an Inngest worker.\n\n## Context on the host component\n\
    \nThe score circle and stage badge are wrapped in:\n```tsx\n<div className=\"flex items-center gap-3\"\
    \ aria-live=\"polite\">\n  {/* 80x80 score circle */}\n  {/* stage badge */}\n  {/* NEW: hubspot sync\
    \ element */}\n</div>\n```\n\nThe profile header also has contact details (phone, email, last contacted)\
    \ on the left side.\n\n## Your task\n\n1. Navigate to https://rekurve.localhost and log in (the app\
    \ should have a session or redirect to login — if login is required, report that and do your review\
    \ statically from the code).\n2. Navigate to any lead profile page (try /leads, then click a lead,\
    \ or try /pipeline to find a lead).\n3. Review the \"Syncing to HubSpot…\" badge state (most leads\
    \ that were recently captured will show this since the cutover is new).\n4. Review both states if\
    \ possible:\n   - **Syncing state**: Badge with \"Syncing to HubSpot…\" text (variant=\"outline\"\
    , text-xs)\n   - **Linked state**: \"View in HubSpot\" link (text-muted-foreground text-xs underline)\n\
    5. If you can only see one state, review it thoroughly and note what the other state would look like\
    \ based on the code.\n\n## What to evaluate\n\n- **Visual hierarchy**: Does the sync status compete\
    \ with or complement the score circle and stage badge?\n- **Readability**: Is \"Syncing to HubSpot…\"\
    \ copy clear? Does it communicate the right level of urgency/patience?\n- **Sizing and spacing**:\
    \ Is the badge appropriately sized relative to the 80px score circle and stage badge? Does `gap-3`\
    \ give enough breathing room?\n- **Color and contrast**: Does `variant=\"outline\"` Badge with `text-xs`\
    \ have sufficient contrast? Does the \"View in HubSpot\" link use `text-muted-foreground` appropriately\
    \ (de-emphasized but still accessible)?\n- **Hover state**: Does the link hover (`hover:text-foreground`)\
    \ feel correct? Is `underline-offset-2` the right choice?\n- **Loading/transition feel**: Does a Badge\
    \ feel like the right affordance for an async-loading state vs. a spinner, progress indicator, or\
    \ subtle text?\n- **Mobile responsiveness**: The parent flex container uses `sm:flex-row sm:items-center\
    \ sm:justify-between` — does the new element wrap correctly on mobile?\n- **Accessibility**: Is `aria-live=\"\
    polite\"` on the parent sufficient for announcing the state change when the Realtime bridge triggers\
    \ a refetch? Is the link's accessible text (\"View in HubSpot\") descriptive enough for screen readers?\n\
    - **Brand fit**: Does this match the existing design system used elsewhere in the app (Badges, muted\
    \ text, underline links)?\n\nProduce a structured design review report in markdown with:\n- An overall\
    \ verdict (Approved / Approved with minor suggestions / Changes requested)\n- Findings by category\
    \ (Visual Hierarchy, Copy, Spacing & Sizing, Color & Contrast, Accessibility, Mobile, Brand Fit)\n\
    - Specific line-level suggestions with the exact className or copy change\n- Screenshots or descriptions\
    \ of what you observed in the browser (or note if the browser was inaccessible)"
