name: Post-Deploy Verification

on:
  repository_dispatch:
    types:
      - "vercel.deployment.ready"

jobs:
  setup:
    name: DB Migration & E2E Setup (${{ github.event.client_payload.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      statuses: write
    # NOTE: db_url / db_url_unpooled are deliberately NOT job outputs.
    # GitHub silently scrubs any job output whose value contains a
    # registered secret (the Neon URI embeds the role password) → it
    # arrives empty in `needs.setup.outputs.*`. Only the non-secret
    # branch_id crosses the job boundary; every consuming job re-derives
    # the URLs from it via the ./.github/actions/neon-db-url composite.
    outputs:
      branch_id: ${{ steps.neon.outputs.branch_id }}
      pre_migrate_timestamp: ${{ steps.pre_migrate.outputs.timestamp }}

    steps:
      - name: Report job & status
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "DB Migration & E2E Setup"

      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        id: modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

      - name: Yarn cache
        if: steps.modules-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: make install

      - name: Resolve Neon branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          GIT_REF: ${{ github.event.client_payload.git.ref }}
          ENVIRONMENT: ${{ github.event.client_payload.environment }}
        run: |
          BRANCHES=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches")

          if [ "$ENVIRONMENT" = "production" ]; then
            BRANCH_ID=$(echo "$BRANCHES" | jq -r '.branches[] | select(.primary == true) | .id')
          else
            BRANCH_ID=$(echo "$BRANCHES" | jq -r --arg ref "preview/$GIT_REF" \
              '.branches[] | select(.name == $ref) | .id')
          fi

          if [ -z "$BRANCH_ID" ]; then
            echo "::error::Could not resolve Neon branch for ref '$GIT_REF' \
          (environment '$ENVIRONMENT'). DB-dependent E2E/integration tests \
          now require a database — failing here at the source so the cause \
          is one clear error, not a wall of downstream neon() failures."
            exit 1
          fi

          # branch_id is NOT a secret — it crosses the job boundary safely.
          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve database URLs
        id: dburl
        if: steps.neon.outputs.branch_id
        uses: ./.github/actions/neon-db-url
        with:
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          neon_project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_id: ${{ steps.neon.outputs.branch_id }}

      - name: Record pre-migration timestamp
        if: steps.neon.outputs.branch_id
        id: pre_migrate
        run: echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Run database check
        if: steps.neon.outputs.branch_id
        run: yarn db:check
        env:
          SKIP_ENV_VALIDATION: 1
          DATABASE_URL_UNPOOLED: ${{ steps.dburl.outputs.db_url_unpooled }}

      - name: Run database migrations
        id: migrate
        if: steps.neon.outputs.branch_id
        run: yarn db:migrate
        env:
          SKIP_ENV_VALIDATION: 1
          DATABASE_URL_UNPOOLED: ${{ steps.dburl.outputs.db_url_unpooled }}

      # Notify BetterStack on production migration failure (P1) — uncomment
      # once a heartbeat monitor is provisioned and BETTERSTACK_HEARTBEAT_MIGRATION
      # is set. Migrations run *after* Vercel has deployed the new code, so a
      # failed migration leaves the schema out of sync with live code → P1.
      # The `/1` suffix signals failure (non-zero exit code), which fires the
      # heartbeat monitor's incident escalation.
      # - name: Notify BetterStack — production migration failed (P1)
      #   if: ${{ failure() && steps.migrate.outcome == 'failure' && github.event.client_payload.environment == 'production' }}
      #   env:
      #     BETTERSTACK_HEARTBEAT_MIGRATION: ${{ secrets.BETTERSTACK_HEARTBEAT_MIGRATION }}
      #     SHA: ${{ github.event.client_payload.git.sha }}
      #     RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      #   run: |
      #     curl -fsS -X POST "$BETTERSTACK_HEARTBEAT_MIGRATION/1" \
      #       -d "Production DB migration failed for $SHA — $RUN_URL"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps

  integration:
    name: Rstest Integration (${{ github.event.client_payload.environment }})
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      statuses: write

    steps:
      - name: Report job & status
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Rstest Integration"

      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
          fail-on-cache-miss: true

      - name: Resolve database URLs
        id: dburl
        if: needs.setup.outputs.branch_id
        uses: ./.github/actions/neon-db-url
        with:
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          neon_project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_id: ${{ needs.setup.outputs.branch_id }}

      - name: Run integration tests
        if: needs.setup.outputs.branch_id
        run: make test_integration
        env:
          INTEGRATION_DB: "1"
          SKIP_ENV_VALIDATION: "1"
          DATABASE_URL: ${{ steps.dburl.outputs.db_url }}
          DATABASE_URL_UNPOOLED: ${{ steps.dburl.outputs.db_url_unpooled }}

  shard:
    name: E2E Test ${{ matrix.shard }}/4 (${{ github.event.client_payload.environment }})
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
      statuses: write
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Report job & status
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "E2E Test ${{ matrix.shard }}"

      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
          fail-on-cache-miss: true

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true

      - name: Install Playwright system deps
        run: yarn playwright install-deps

      - name: Resolve database URLs
        id: dburl
        if: needs.setup.outputs.branch_id
        uses: ./.github/actions/neon-db-url
        with:
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          neon_project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_id: ${{ needs.setup.outputs.branch_id }}

      # Defensive guard: if the setup job resolved a branch, the DB URL
      # MUST be present here. Fail loudly now instead of letting Playwright
      # run with an empty DATABASE_URL and surface a confusing mid-suite
      # `No database connection string was provided to neon()` error.
      - name: Assert DB URL resolved when a branch exists
        if: needs.setup.outputs.branch_id
        env:
          DATABASE_URL: ${{ steps.dburl.outputs.db_url }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::branch_id was resolved but DATABASE_URL is empty \
          — neon-db-url did not produce a URL. Aborting before Playwright."
            exit 1
          fi

      - name: Run Playwright tests
        run: make test_e2e
        env:
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}/4
          E2E_SKIP_GLOBAL_TEARDOWN: "1"
          VERCEL_URL: ${{ github.event.client_payload.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DATABASE_URL: ${{ steps.dburl.outputs.db_url }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          # Inbound webhook tests only run on production — the HubSpot
          # webhook target URL is manually pinned to the production deployment
          HUBSPOT_WEBHOOK_ACTIVE: ${{ github.event.client_payload.environment == 'production' && '1' || '' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}-${{ github.event.client_payload.environment }}
          path: |
            blob-report/
            test-results/
          if-no-files-found: error
          retention-days: 30

  summary:
    name: Summary (${{ github.event.client_payload.environment }})
    needs: shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      statuses: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          path: all-blob-reports
          pattern: blob-report-*-${{ github.event.client_payload.environment }}
          merge-multiple: true

      - name: Merge blob reports into HTML
        # The shard upload step bundles `blob-report/` and `test-results/`
        # together, so `merge-multiple: true` puts blob files under
        # `all-blob-reports/blob-report/`, not at the top level.
        run: yarn playwright merge-reports --reporter html ./all-blob-reports/blob-report

      - name: Upload merged report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.event.client_payload.environment }}
          path: playwright-report/
          retention-days: 30

      - name: Fail if any shard failed
        if: ${{ contains(needs.shard.result, 'failure') || contains(needs.shard.result, 'cancelled') }}
        run: exit 1

  cleanup:
    name: Cleanup (${{ github.event.client_payload.environment }})
    needs: [setup, shard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: yarn-modules-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

      - name: Resolve database URLs
        id: dburl
        if: needs.setup.outputs.branch_id
        uses: ./.github/actions/neon-db-url
        with:
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          neon_project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_id: ${{ needs.setup.outputs.branch_id }}

      - name: Sweep test residue
        if: needs.setup.outputs.branch_id
        env:
          DATABASE_URL: ${{ steps.dburl.outputs.db_url }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: yarn tsx -e "import('./e2e/utils/global-teardown.ts').then(m => m.default())"

      - name: Rollback migrations (preview — reset branch to parent)
        if: ${{ contains(needs.shard.result, 'failure') && needs.setup.outputs.branch_id != '' && github.event.client_payload.environment != 'production' }}
        uses: neondatabase/reset-branch-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ needs.setup.outputs.branch_id }}
          parent: true
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Rollback migrations (production — point-in-time restore)
        if: ${{ contains(needs.shard.result, 'failure') && needs.setup.outputs.branch_id != '' && github.event.client_payload.environment == 'production' }}
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_ID: ${{ needs.setup.outputs.branch_id }}
          BEFORE_TS: ${{ needs.setup.outputs.pre_migrate_timestamp }}
        run: |
          curl -X POST \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID/restore" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"source_branch_id\": \"$BRANCH_ID\", \"source_timestamp\": \"$BEFORE_TS\", \"preserve_under_name\": \"pre-migration-backup\"}"
          echo "::warning::Production database restored to pre-migration state ($BEFORE_TS)"

  # Override the commit status when any shard fails/cancels or the summary
  # job itself does not succeed. The Vercel post-status action posts its
  # status from the start of the summary job using `needs.shard.result`, so
  # it can't see failures inside the summary job (e.g. merge-reports failing)
  # and reports `success` on cancellation. This job runs after shard+summary
  # complete and overwrites the commit status with `failure` so PR checks
  # reflect reality.
  override-status:
    name: Mark failed run as failed
    needs: [integration, shard, summary]
    if: ${{ always() && (needs.summary.result != 'success' || needs.integration.result == 'failure' || needs.integration.result == 'cancelled' || contains(needs.shard.result, 'failure') || contains(needs.shard.result, 'cancelled')) }}
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post failure commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.client_payload.git.sha }}
          REPO: ${{ github.repository }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHARD_RESULT: ${{ needs.shard.result }}
          SUMMARY_RESULT: ${{ needs.summary.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
        run: |
          if [ "$SUMMARY_RESULT" = "cancelled" ] || [[ "$SHARD_RESULT" == *cancelled* ]] || [ "$INTEGRATION_RESULT" = "cancelled" ]; then
            DESCRIPTION="Job cancelled (likely timeout)"
          else
            DESCRIPTION="Verification failed (integration: $INTEGRATION_RESULT, shard: $SHARD_RESULT, summary: $SUMMARY_RESULT)"
          fi
          gh api -X POST \
            "repos/$REPO/statuses/$SHA" \
            -f state=failure \
            -f context="Post-Deploy Verification" \
            -f description="$DESCRIPTION" \
            -f target_url="$TARGET_URL"

      # Notify BetterStack on production E2E / integration test failure
      # (P3-P4) — uncomment once a heartbeat monitor is provisioned and
      # BETTERSTACK_HEARTBEAT_VERIFICATION is set. These failures don't roll
      # back the deploy (Vercel has already shipped) but they block subsequent
      # deploys including critical CVE patches from Renovate, so they need
      # business-hours attention. Use a less aggressive escalation policy on
      # this monitor than the migration heartbeat.
      # - name: Notify BetterStack — production verification failed (P3-P4)
      #   if: ${{ github.event.client_payload.environment == 'production' }}
      #   env:
      #     BETTERSTACK_HEARTBEAT_VERIFICATION: ${{ secrets.BETTERSTACK_HEARTBEAT_VERIFICATION }}
      #     COMMIT_SHA: ${{ github.event.client_payload.git.sha }}
      #     RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      #     SHARD_RESULT: ${{ needs.shard.result }}
      #     INTEGRATION_RESULT: ${{ needs.integration.result }}
      #     SUMMARY_RESULT: ${{ needs.summary.result }}
      #   run: |
      #     curl -fsS -X POST "$BETTERSTACK_HEARTBEAT_VERIFICATION/1" \
      #       -d "Production post-deploy verification failed for $COMMIT_SHA (integration: $INTEGRATION_RESULT, shard: $SHARD_RESULT, summary: $SUMMARY_RESULT) — $RUN_URL"

  # Emit a release event to observability platforms once production verification
  # passes, so incidents and metric changes can be correlated to a specific
  # deploy SHA. `version` is set only when the deploy SHA matches a GitHub
  # Release tag (i.e. semantic-release cut a feat/fix release), which lets
  # consumers distinguish user-facing releases from chore/docs/ci deploys.
  release-event:
    name: Release Event
    needs: [integration, shard, summary]
    if: ${{ github.event.client_payload.environment == 'production' && needs.summary.result == 'success' && needs.integration.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve release version (if SHA matches latest release tag)
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.client_payload.git.sha }}
        run: |
          VERSION=""
          LATEST_TAG=$(gh release view --repo "$REPO" --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            TAG_SHA=$(gh api "repos/$REPO/commits/$LATEST_TAG" --jq '.sha' 2>/dev/null || echo "")
            if [ "$TAG_SHA" = "$SHA" ]; then
              VERSION="$LATEST_TAG"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$VERSION" ]; then
            echo "Resolved release tag $VERSION for $SHA"
          else
            echo "No release tag points at $SHA — emitting deploy event without version"
          fi

      - name: Annotate PostHog with release
        env:
          POSTHOG_ANNOTATION_API_KEY: ${{ secrets.POSTHOG_ANNOTATION_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          SHA: ${{ github.event.client_payload.git.sha }}
          REF: ${{ github.event.client_payload.git.ref }}
          URL: ${{ github.event.client_payload.url }}
          ACTOR: ${{ github.actor }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          if [ -n "$VERSION" ]; then
            CONTENT="Release $VERSION ($SHORT_SHA) by $ACTOR — $URL"
          else
            CONTENT="Deploy $SHORT_SHA on $REF by $ACTOR — $URL"
          fi
          curl -fsS -X POST "$POSTHOG_HOST/api/projects/$POSTHOG_PROJECT_ID/annotations/" \
            -H "Authorization: Bearer $POSTHOG_ANNOTATION_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc \
              --arg content "$CONTENT" \
              --arg scope "project" \
              '{content:$content, scope:$scope}')"

      # BetterStack release event — uncomment once a Telemetry source is
      # provisioned and BETTERSTACK_INGESTING_HOST + BETTERSTACK_SOURCE_TOKEN
      # are populated. Sends a structured log so the event can be filtered/
      # overlaid against incidents and uptime data. `version` is omitted when
      # no release tag points at this SHA (chore/docs/ci deploys).
      # - name: Send release event to BetterStack
      #   env:
      #     BETTERSTACK_INGESTING_HOST: ${{ vars.BETTERSTACK_INGESTING_HOST }}
      #     BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
      #     SHA: ${{ github.event.client_payload.git.sha }}
      #     REF: ${{ github.event.client_payload.git.ref }}
      #     URL: ${{ github.event.client_payload.url }}
      #     ACTOR: ${{ github.actor }}
      #     VERSION: ${{ steps.version.outputs.version }}
      #   run: |
      #     curl -fsS -X POST "https://$BETTERSTACK_INGESTING_HOST/" \
      #       -H "Authorization: Bearer $BETTERSTACK_SOURCE_TOKEN" \
      #       -H "Content-Type: application/json" \
      #       -d "$(jq -nc \
      #         --arg event "release" \
      #         --arg sha "$SHA" \
      #         --arg version "$VERSION" \
      #         --arg ref "$REF" \
      #         --arg url "$URL" \
      #         --arg actor "$ACTOR" \
      #         '{event:$event, sha:$sha, ref:$ref, url:$url, actor:$actor}
      #          + (if $version != "" then {version:$version} else {} end)')"
